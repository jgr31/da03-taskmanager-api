services:
  app:
    build: .
    container_name: da03_taskmanager_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: da03_taskmanager
      DB_USERNAME: da03_user
      DB_PASSWORD: da03_password
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: da03_taskmanager_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: da03_taskmanager
      MYSQL_USER: da03_user
      MYSQL_PASSWORD: da03_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
